name: Cleanup Docker Images

on:
  schedule:
    # Run weekly on Sunday at 3 AM UTC (reduced from daily to prevent over-cleanup)
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      keep_count:
        description: 'Minimum number of versions to keep'
        required: false
        default: '10'
        type: number
      untagged_only:
        description: 'Delete only untagged versions'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  cleanup-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Cleanup untagged frontend images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'band-on-the-run'
          package-type: 'container'
          min-versions-to-keep: ${{ inputs.keep_count || 10 }}
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup untagged backend images
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'band-on-the-run-backend'
          package-type: 'container'
          min-versions-to-keep: ${{ inputs.keep_count || 10 }}
          delete-only-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-tags:
    runs-on: ubuntu-latest
    # ONLY run when manually dispatched with untagged_only=false (never on schedule)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.untagged_only == false }}
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Cleanup old frontend tagged images (except latest, semver tags)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'band-on-the-run'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
          ignore-versions: '^(latest|main|v?\\d+\\.\\d+\\.\\d+|pr-\\d+)$'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old backend tagged images (except latest, semver tags)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'band-on-the-run-backend'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
          ignore-versions: '^(latest|main|v?\\d+\\.\\d+\\.\\d+|pr-\\d+)$'
          token: ${{ secrets.GITHUB_TOKEN }}
