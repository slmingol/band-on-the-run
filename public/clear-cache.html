<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Clear Band on the Run Cache</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 50px; }
        h1 { color: #2ecc71; }
    </style>
</head>
<body>
    <h1>Clearing Band on the Run Cache...</h1>
    <script>
        // Clear all cache and data
        localStorage.clear();
        sessionStorage.clear();

        document.body.innerHTML = '<h1>✅ Cache Cleared!</h1><p>Close this tab and refresh your game at <a href="http://localhost:5173">localhost:5173</a></p>';
    </script>
</body>
</html>
