services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: band-frontend-dev
    ports:
      - "3434:5173"
    volumes:
      - ..:/app
      - /app/node_modules
      - ../public/audio/stems:/app/public/audio/stems:ro
    environment:
      - VITE_HMR_HOST=localhost

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: band-backend-dev
    ports:
      - "3435:3001"
    volumes:
      - ../server:/app/server
      - ../public/audio:/app/public/audio
      - ../scripts:/app/scripts:ro
      - ./backend-data:/app/server/data
      - ../package.json:/app/package.json:ro
      - ../node_modules:/app/node_modules:ro
    environment:
      - NODE_ENV=development
    command: node --watch server/index.js
